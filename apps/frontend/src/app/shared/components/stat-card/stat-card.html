<mat-card class="stat-card" appearance="outlined">
  <mat-card-content class="stat-card__content">
    <mat-icon class="stat-card__icon">{{ icon() }}</mat-icon>
    <div>
      <p class="stat-card__value">{{ value() }}</p>
      <p class="stat-card__label">{{ label() }}</p>
    </div>
  </mat-card-content>
</mat-card>
