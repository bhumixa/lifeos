<section class="habit-list-page">
  <header class="habit-list-page__header">
    <h1>Habits</h1>
    <button type="button" mat-flat-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      New Habit
    </button>
  </header>

  <app-habit-filter-panel (filterChanged)="onFilterChange($event)" />

  @if (store.error(); as error) {
    <div class="habit-list-page__error">
      <p>{{ error }}</p>
      <button type="button" mat-stroked-button (click)="retry()">Retry</button>
    </div>
  } @else if (store.loading() && store.habits().length === 0) {
    <div class="habit-list-page__skeletons">
      @for (row of skeletonRows; track $index) {
        <app-skeleton height="88px" />
      }
    </div>
  } @else if (store.isEmpty()) {
    <app-empty-state icon="repeat" title="No habits yet" message="Create your first habit to start tracking.">
      <button type="button" mat-flat-button color="primary" (click)="openCreateDialog()">New Habit</button>
    </app-empty-state>
  } @else {
    <div class="habit-list-page__list">
      @for (habit of store.habits(); track habit.id) {
        <app-habit-card
          [habit]="habit"
          (view)="viewHabit(habit)"
          (edit)="openEditDialog(habit)"
          (delete)="deleteHabit(habit)"
          (toggleActive)="toggleActive(habit)"
          (complete)="completeHabit(habit)"
          (undo)="undoHabit(habit)"
        />
      }
    </div>

    <mat-paginator
      [length]="store.meta().total"
      [pageSize]="store.meta().pageSize"
      [pageIndex]="store.meta().page - 1"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPageChange($event)"
    />
  }
</section>
