<mat-card appearance="outlined" class="habit-card" [class.habit-card--inactive]="!habit().isActive">
  <mat-card-content class="habit-card__content">
    <app-habit-progress-ring [percent]="habit().completionPercent" [color]="habit().color" [size]="48" />

    <button type="button" class="habit-card__body" (click)="view.emit()">
      <p class="habit-card__name">{{ habit().name }}</p>
      <div class="habit-card__badges">
        <app-badge [label]="frequencyLabel()" [variant]="frequencyVariant()" />
        @if (habit().category; as category) {
          <app-badge [label]="category" variant="neutral" />
        }
        @if (reminder(); as reminderTime) {
          <app-badge [label]="'Reminder ' + reminderTime" variant="neutral" />
        }
      </div>
      <p class="habit-card__meta">
        {{ habit().currentPeriodCount }} of {{ habit().targetCount }} {{ periodLabel() }}
      </p>
    </button>

    <app-habit-completion-button
      [completedToday]="habit().completedToday"
      [todayCount]="habit().todayCount"
      [targetCount]="habit().targetCount"
      (complete)="complete.emit()"
      (undo)="undo.emit()"
    />

    <mat-slide-toggle
      [checked]="habit().isActive"
      matTooltip="Active"
      aria-label="Toggle habit active"
      (change)="toggleActive.emit()"
      (click)="$event.stopPropagation()"
    />

    <button type="button" mat-icon-button aria-label="Habit actions" [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button type="button" mat-menu-item (click)="view.emit()">
        <mat-icon>visibility</mat-icon>
        <span>View</span>
      </button>
      <button type="button" mat-menu-item (click)="edit.emit()">
        <mat-icon>edit</mat-icon>
        <span>Edit</span>
      </button>
      <button type="button" mat-menu-item (click)="delete.emit()">
        <mat-icon>delete</mat-icon>
        <span>Delete</span>
      </button>
    </mat-menu>
  </mat-card-content>
</mat-card>
