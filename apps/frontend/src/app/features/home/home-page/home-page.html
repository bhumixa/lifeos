<main class="home-page">
  <button
    type="button"
    mat-icon-button
    class="home-page__theme-toggle"
    aria-label="Toggle dark mode"
    (click)="themeService.toggle()"
  >
    <mat-icon>dark_mode</mat-icon>
  </button>

  <h1>LifeOS AI</h1>

  @if (user(); as currentUser) {
    <p>Welcome, {{ currentUser.name }}.</p>
  }

  @if (health(); as status) {
    <p class="status" [class.status--ok]="status.status === 'ok'">
      API: {{ status.status }} · Database: {{ status.database }}
    </p>
  } @else if (healthError()) {
    <p class="status status--error">{{ healthError() }}</p>
  } @else {
    <p class="status">Checking backend connection…</p>
  }

  <button mat-stroked-button type="button" [disabled]="isLoggingOut()" (click)="logout()">Log out</button>
</main>
