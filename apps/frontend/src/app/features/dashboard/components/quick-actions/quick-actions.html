<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>Quick Actions</mat-card-title>
  </mat-card-header>
  <mat-card-content class="quick-actions__grid">
    @for (action of actions; track action.route) {
      <a mat-stroked-button [routerLink]="action.route" class="quick-actions__button">
        <mat-icon>{{ action.icon }}</mat-icon>
        {{ action.label }}
      </a>
    }
  </mat-card-content>
</mat-card>
