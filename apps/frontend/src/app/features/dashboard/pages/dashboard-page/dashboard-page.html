<section class="dashboard">
  <header class="dashboard__header">
    <h1>{{ welcomeMessage() }}</h1>
    <p class="dashboard__datetime">{{ formattedDate() }} · {{ formattedTime() }}</p>
  </header>

  <div class="dashboard__stats">
    @if (taskStatsLoading()) {
      @for (i of [0, 1, 2]; track i) {
        <app-skeleton height="76px" />
      }
    } @else {
      @for (stat of taskStats(); track stat.label) {
        <app-stat-card [label]="stat.label" [value]="stat.value" [icon]="stat.icon" />
      }
    }
    @for (stat of placeholderStats; track stat.label) {
      <app-stat-card [label]="stat.label" [value]="stat.value" [icon]="stat.icon" />
    }
  </div>

  <div class="dashboard__panels">
    <app-quick-actions />
    <app-routine-summary />
    <app-recent-activity />
  </div>
</section>
