<mat-card appearance="outlined" class="goal-card" [class.goal-card--archived]="goal().archived">
  <mat-card-content class="goal-card__content">
    <app-goal-progress-ring [percent]="goal().progressPercent" [color]="goal().color" [size]="48" />

    <button type="button" class="goal-card__body" (click)="view.emit()">
      <p class="goal-card__title">
        <mat-icon class="goal-card__icon">{{ goal().icon }}</mat-icon>
        {{ goal().title }}
      </p>
      <div class="goal-card__badges">
        <app-badge [label]="statusLabel()" [variant]="statusVariant()" />
        <app-badge [label]="priorityLabel()" [variant]="priorityVariant()" />
        @if (goal().category; as category) {
          <app-badge [label]="category" variant="neutral" />
        }
        @if (deadline(); as due) {
          <app-badge [label]="due.label" [variant]="due.variant" />
        }
      </div>
      <p class="goal-card__meta">{{ progressText() }} &middot; {{ goal().progressPercent }}%</p>
    </button>

    <button type="button" mat-icon-button aria-label="Goal actions" [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button type="button" mat-menu-item (click)="view.emit()">
        <mat-icon>visibility</mat-icon>
        <span>View</span>
      </button>
      <button type="button" mat-menu-item (click)="edit.emit()">
        <mat-icon>edit</mat-icon>
        <span>Edit</span>
      </button>
      @if (goal().archived) {
        <button type="button" mat-menu-item (click)="unarchive.emit()">
          <mat-icon>unarchive</mat-icon>
          <span>Unarchive</span>
        </button>
      } @else {
        <button type="button" mat-menu-item (click)="archive.emit()">
          <mat-icon>archive</mat-icon>
          <span>Archive</span>
        </button>
      }
      <button type="button" mat-menu-item (click)="delete.emit()">
        <mat-icon>delete</mat-icon>
        <span>Delete</span>
      </button>
    </mat-menu>
  </mat-card-content>
</mat-card>
