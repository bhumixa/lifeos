<h2 mat-dialog-title>{{ isEdit ? 'Edit milestone' : 'Add milestone' }}</h2>

<mat-dialog-content>
  <form class="milestone-form" [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="milestone-form__full">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" autocomplete="off" />
      @if (form.controls.title.hasError('required') && form.controls.title.touched) {
        <mat-error>Title is required.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="milestone-form__full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="2"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="milestone-form__full">
      <mat-label>Due date</mat-label>
      <input matInput [matDatepicker]="dueDatePicker" formControlName="dueDate" />
      <mat-datepicker-toggle matIconSuffix [for]="dueDatePicker" />
      <mat-datepicker #dueDatePicker />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button (click)="cancel()">Cancel</button>
  <button type="button" mat-flat-button color="primary" (click)="submit()">
    {{ isEdit ? 'Save milestone' : 'Add milestone' }}
  </button>
</mat-dialog-actions>
