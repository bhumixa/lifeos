@if (cells().length === 0) {
  <p class="heatmap__empty">No data for this period yet.</p>
} @else {
  <div class="heatmap">
    @for (week of weeks(); track $index) {
      <div class="heatmap__column">
        @for (cell of week; track $index) {
          @if (cell) {
            <div
              class="heatmap__cell"
              [style.background]="color()"
              [style.opacity]="opacityFor(cell.value)"
              [matTooltip]="cell.date + ': ' + cell.value"
            ></div>
          } @else {
            <div class="heatmap__cell heatmap__cell--empty"></div>
          }
        }
      </div>
    }
  </div>
}
