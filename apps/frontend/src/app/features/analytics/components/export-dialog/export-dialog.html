<h2 mat-dialog-title>New Export</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="export-dialog__content">
    <mat-form-field appearance="outline">
      <mat-label>Report</mat-label>
      <mat-select formControlName="type">
        @for (type of reportTypes; track type) {
          <mat-option [value]="type">{{ reportTypeLabel(type) }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Format</mat-label>
      <mat-select formControlName="format">
        @for (format of formats; track format) {
          <mat-option [value]="format">{{ format }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Period</mat-label>
      <mat-select formControlName="period">
        @for (period of periods; track period) {
          <mat-option [value]="period">{{ periodLabel(period) }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    @if (error()) {
      <p class="export-dialog__error">{{ error() }}</p>
    }
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="button" mat-button (click)="cancel()">Cancel</button>
    <button type="submit" mat-flat-button [disabled]="submitting()">
      @if (submitting()) {
        <mat-spinner diameter="18" />
      } @else {
        Generate
      }
    </button>
  </mat-dialog-actions>
</form>
