<mat-card appearance="outlined" class="task-card" [class.task-card--completed]="isCompleted()">
  <mat-card-content class="task-card__content">
    <mat-checkbox
      [checked]="isCompleted()"
      [disabled]="isCompleted()"
      aria-label="Mark task complete"
      (change)="toggleComplete.emit()"
      (click)="$event.stopPropagation()"
    />

    <button type="button" class="task-card__body" (click)="view.emit()">
      <p class="task-card__title">{{ task().title }}</p>
      @if (task().description) {
        <p class="task-card__description">{{ task().description }}</p>
      }
      <div class="task-card__badges">
        <app-badge [label]="priorityLabel()" [variant]="priorityVariant()" />
        <app-badge [label]="statusLabel()" [variant]="statusVariant()" />
        @if (dueIndicator(); as due) {
          <app-badge [label]="due.label" [variant]="due.variant" />
        }
        @for (tag of task().tags; track tag) {
          <app-badge [label]="tag" variant="neutral" />
        }
      </div>
    </button>

    <button
      type="button"
      mat-icon-button
      aria-label="Task actions"
      [matMenuTriggerFor]="menu"
      (click)="$event.stopPropagation()"
    >
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button type="button" mat-menu-item (click)="view.emit()">
        <mat-icon>visibility</mat-icon>
        <span>View</span>
      </button>
      <button type="button" mat-menu-item (click)="edit.emit()">
        <mat-icon>edit</mat-icon>
        <span>Edit</span>
      </button>
      <button type="button" mat-menu-item (click)="delete.emit()">
        <mat-icon>delete</mat-icon>
        <span>Delete</span>
      </button>
    </mat-menu>
  </mat-card-content>
</mat-card>
